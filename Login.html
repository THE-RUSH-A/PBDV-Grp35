<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Housing Login</title>
</head>
<body>
    <h2>Student Housing and Roommate Matching Platform</h2>
    
    
    <form action="/login" method="POST">
        <h3>Login</h3>
        
        
        <div>
            <label for="student_number">Student Number:</label><br>
            <input type="text" id="student_number" name="student_number" 
                   placeholder="Enter your student number" required>
        </div>
        <br>
        
        
        <div>
            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" 
                   placeholder="Enter your password" required minlength="8">
        </div>
        <br>
        
        
        <div>
            <label>I am a:</label><br>
            <input type="radio" id="student" name="role" value="student" checked>
            <label for="student">Student</label><br>
            <input type="radio" id="admin" name="role" value="admin">
            <label for="admin">Room Administrator</label>
        </div>
        <br>
        
        
        <button type="submit">Log In</button>
    </form>
    
    <br>
    <hr>
    
    
    <p>Don't have an account? <a href="/register">Create one here</a></p>
    
    
    <p><a href="/forgot-password">Forgot Password?</a></p>
</body>
</html>
